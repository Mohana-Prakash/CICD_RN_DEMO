name: Android CI

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  android-build:
    name: Build and Distribute APK
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Step 3 — Install JS dependencies
      - name: Install npm dependencies
        run: npm ci

      # Step 4 — Setup Java
      - name: Setup Java 17
        uses: actions/setup-java@v4.7.1
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      # Step 5 — Setup Ruby + Fastlane
      - name: Setup Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: android

      # Step 6 — Grant Gradle permission
      - name: Grant execute permission for Gradlew
        run: chmod +x android/gradlew

      # Step 7 — Create Firebase credentials from GitHub Secret
      - name: Write Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > android/firebase-service-account.json

      # Step 8 — Build APK + Upload to Firebase App Distribution
      - name: Build and distribute APK
        run: |
          cd android
          bundle exec fastlane beta

      # Step 9 — Remove credentials (always)
      - name: Remove Firebase credentials
        if: always()
        run: |
          rm -f android/firebase-service-account.json

      # Step 10 — Upload APK artifact to GitHub
      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

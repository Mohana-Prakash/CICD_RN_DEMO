name: Android CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  android-build:
    name: Build and Distribute APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm ci

      - name: Show Java version
        run: java -version

      - name: Install Bundler and Fastlane gems
        run: |
          gem install bundler --no-document
          cd android && bundle install

      - name: Grant execute permission for Gradlew
        run: chmod +x android/gradlew

      - name: Write Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > android/firebase-service-account.json

      - name: Build and distribute APK
        run: |
          cd android
          bundle exec fastlane beta

      - name: Remove Firebase credentials
        if: always()
        run: |
          rm -f android/firebase-service-account.json

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

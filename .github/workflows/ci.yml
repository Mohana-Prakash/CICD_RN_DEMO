name: Android CI

# Trigger: run this workflow on every push to the main branch only
on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android-build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest  # Free Linux runner provided by GitHub

    steps:

      # ── Step 1: Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Setup Node.js ─────────────────────────────────────
      - name: Setup Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Step 3: Cache npm dependencies ───────────────────────────
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # ── Step 4: Install npm dependencies ─────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── Step 5: Setup Java 17 ─────────────────────────────────────
      - name: Setup Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Step 6: Setup Ruby + Bundler + Fastlane ───────────────────
      # ruby/setup-ruby reads android/Gemfile, runs `bundle install`,
      # and caches the gems between runs so re-installs are fast.
      # bundler-cache: true means the action handles caching for you —
      # no need for a separate Cache step for Ruby gems.
      - name: Setup Ruby and Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: android

      # ── Step 7: Grant execute permission for Gradlew ─────────────
      # Fastlane calls ./gradlew internally — it still needs the
      # executable bit set on Linux.
      - name: Grant execute permission for Gradlew
        run: chmod +x android/gradlew

      # ── Step 8: Build Android Debug APK via Fastlane ─────────────
      # `bundle exec fastlane build_debug` runs the lane defined in
      # android/fastlane/Fastfile. Fastlane calls:
      #   ./gradlew clean
      #   ./gradlew assembleDebug
      # Using `bundle exec` ensures the exact Fastlane version pinned
      # in Gemfile.lock is used, not whatever is installed system-wide.
      - name: Build Android Debug APK
        run: |
          cd android
          bundle exec fastlane build_debug

      # ── Step 9: Upload APK as GitHub Actions artifact ─────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
